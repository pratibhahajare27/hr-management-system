<h2 class="style">Employee List</h2>
<form [formGroup]="employeeForm" (ngSubmit)="saveEmployee()" class="form">
    <input placeholder="Name" formControlName="name" class="input" />
    <input placeholder="Email" formControlName="email" class="input" />
    <input placeholder="Role" formControlName="role" class="input" />
    <input placeholder="Department" formControlName="department" class="input" />
    <button type="submit" class="button">
        {{selectedEmployeeId()=== null?'Add Employee' : 'update Employee'}}
    </button>
    @if(selectedEmployeeId()){
    <button type="button" (click)="cancelEdit()" class="cancel">Cancel</button>
    }
</form>
<table class="table">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role </th>
        <th>Department</th>
        <th>Actions</th>
    </tr>
    @for (emp of employees() ;track emp.id){
    <tr>
        <td>{{emp.name}}</td>
        <td>{{emp.email}}</td>
        <td>{{emp.role}}</td>
        <td>{{emp.department}}</td>
        <td>
            <button (click)="editEmployee(emp)" type="button">Edit</button>
            <button (click)=" deleteEmployee(emp.id)" class="delete" type="button">Delete</button>
        </td>
    </tr>
    }
</table>
