<div class="employee-container">

    <h2>Employee List</h2>

    <form [formGroup]="employeeForm" (ngSubmit)="saveEmployee()">

        <input type="text" placeholder="Name" formControlName="name">

        <input type="email" placeholder="Email" formControlName="email">

        <input type="text" placeholder="Role" formControlName="role">

        <input type="text" placeholder="Department" formControlName="department">

        <button type="submit">
            {{ selectedEmployeeId() === null ? 'Add Employee' : 'Update Employee' }}
        </button>

        @if (selectedEmployeeId()) {
        <button type="button" class="cancel" (click)="cancelEdit()">
            Cancel
        </button>
        }

    </form>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

            @for (emp of employees(); track emp.id) {

            <tr>

                <td>{{ emp.name }}</td>
                <td>{{ emp.email }}</td>
                <td>{{ emp.role }}</td>
                <td>{{ emp.department }}</td>

                <td class="action-buttons">

                    <button type="button" (click)="editEmployee(emp)">
                        Edit
                    </button>

                    <button type="button" class="delete" (click)="deleteEmployee(emp.id)">
                        Delete
                    </button>

                </td>

            </tr>

            }

        </tbody>

    </table>

</div>
